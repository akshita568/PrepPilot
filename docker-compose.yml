version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: study_planner_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: study_planner_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/study_planner
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: study_planner_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres_data: